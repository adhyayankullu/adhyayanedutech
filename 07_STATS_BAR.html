<style>

.ae-stats-wrap * { box-sizing: border-box; }

}

.ae-stat-sub { font-size: 12px; color: #8a96b5; margin-top: 2px; }
@media (max-width: 600px) {
  .ae-stats-wrap { padding: 48px 4%; }
  .ae-stat-num { font-size: 34px; }
}
</style>
